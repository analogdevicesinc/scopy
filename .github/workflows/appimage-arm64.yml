name: Scopy arm64 Qt6 Build

on:
    workflow_call:
      inputs:
        docker_tag:
          required: true
          type: string
      secrets:
        CLOUDSMITH_API_KEY:
          required: true

env:
  BUILD_HOST: ubuntu-22.04
  USERNAME: github-actions
  CI_SCRIPT: "ON"

jobs:
  make_arm64_qt6:
    runs-on: ubuntu-24.04-arm
    steps:

        - name: check storage space
          run: df -h
        - name: "Runner cleanup"
          run: |
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
            sudo docker image prune --all --force
            sudo docker builder prune -a --force
        - run: df -h

        - uses: actions/checkout@v6
          with:
                set-safe-directory: 'true'
                fetch-depth: '0'

        - name: Pull the Docker Image
          run: |
                echo ${{ secrets.CLOUDSMITH_API_KEY }} | docker login docker.cloudsmith.io -u ionut-muthi --password-stdin
                docker pull docker.cloudsmith.io/adi/scopy-dockers/scopy2-arm64-native-qt6:${{ inputs.docker_tag }}

        - name: Build Scopy AppImage
          shell: bash
          run: |
                docker run \
                        --mount type=bind,source="$GITHUB_WORKSPACE",target=/home/runner/scopy \
                        docker.cloudsmith.io/adi/scopy-dockers/scopy2-arm64-native-qt6:${{ inputs.docker_tag }} \
                        /bin/bash -c    'cd $HOME && \
                                        sudo chown -R runner:runner scopy && \
                                        cd $HOME/scopy && \
                                        sudo apt-get update && sudo apt-get install -y squashfs-tools patchelf && \
                                        ./ci/arm/arm_native_build_process.sh download_cmake generate_appimage
                                        '
        - name: Set short git commit SHA
          shell: bash
          run: echo "commit_sha=$(git rev-parse --short ${{ github.sha }})" >> "$GITHUB_ENV"

        - uses: actions/upload-artifact@v7
          with:
            name: scopy-arm64-qt6-appimage-${{ env.commit_sha }}
            path: ${{ github.workspace }}/Scopy-arm64.AppImage

        - name: check storage space
          run: df -h
