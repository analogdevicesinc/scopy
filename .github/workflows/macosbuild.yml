name: macOS Qt6 Scopy Build

on:
    workflow_call:

env:
  USERNAME: github-actions
  CACHING_ENABLED: 'false'

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.name }}
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            name: macOS 14 Qt6 (ARM64)
            artifact: Scopy-macOS14-arm64-qt6
          - runner: macos-15-large
            name: macOS 15 Qt6 (Intel)
            artifact: Scopy-macOS15-x86_64-qt6

    steps:
        - uses: actions/checkout@v6
          with:
            fetch-depth: 0

        - name: Build and Install Dependencies
          run: |
            chmod +x ci/macOS/macos_config.sh ci/macOS/install_macos_deps.sh ci/macOS/build_macos.sh ci/macOS/package_darwin.sh
            ./ci/macOS/install_macos_deps.sh

        - name: Build Scopy
          run: |
            export MACOSX_DEPLOYMENT_TARGET=11.0
            ./ci/macOS/build_macos.sh

        - name: Create Scopy.dmg
          run: ./ci/macOS/package_darwin.sh

        - name: Set short git commit SHA
          run: echo "commit_sha=$(git rev-parse --short ${{ github.sha }})" >> "$GITHUB_ENV"

        - uses: actions/upload-artifact@v7
          if: always()
          with:
            name: ${{ matrix.artifact }}-${{ env.commit_sha }}
            path: |
              build/Scopy.dmg
              build/ScopyApp.zip

        # Flagged-risk platform: offscreen viability on macOS is unverified.
        # macdeployqt only bundles libqcocoa.dylib in the .app; the offscreen
        # platform plugin (libqoffscreen.dylib) is not included, so
        # QT_QPA_PLATFORM=offscreen aborts at startup. Point Qt at the Qt
        # install's own platforms dir, which contains libqoffscreen.dylib.
        # buildinfo.py passes this env through to Scopy and forces offscreen.
        - name: Capture build-info screenshot
          continue-on-error: true
          run: |
            # Qt install is $HOME/Qt/6.8.3/macos per ci/macOS/macos_config.sh.
            export QT_QPA_PLATFORM_PLUGIN_PATH="$HOME/Qt/6.8.3/macos/plugins/platforms"
            echo "Using QT_QPA_PLATFORM_PLUGIN_PATH=$QT_QPA_PLATFORM_PLUGIN_PATH"
            ls -l "$QT_QPA_PLATFORM_PLUGIN_PATH/libqoffscreen.dylib" || echo "WARN: libqoffscreen.dylib not found"
            python3 tools/screenshots/buildinfo.py \
              --scopy build/Scopy.app/Contents/MacOS/Scopy \
              --output-root build-info-output

        - name: Upload build-info screenshot
          uses: actions/upload-artifact@v7
          continue-on-error: true
          with:
            name: build-info-macos-${{ matrix.artifact }}
            path: build-info-output/
            if-no-files-found: warn
            retention-days: 30
