name: Documentation Screenshots

on:
    workflow_call:
      inputs:
        docker_tag:
          required: true
          type: string

permissions:
  contents: read

env:
  BUILD_HOST: ubuntu
  USERNAME: github-actions
  CI_SCRIPT: "ON"

jobs:
  screenshots:
    runs-on: ubuntu-latest
    container:
        image: cristianbindea/scopy2-ubuntu24:${{ inputs.docker_tag }}
        options: --user root

    steps:
        - uses: actions/checkout@v6

        - name: Build Scopy
          shell: bash
          run: |
            git config --global --add safe.directory $GITHUB_WORKSPACE
            source $GITHUB_WORKSPACE/ci/ubuntu/ubuntu_build_process.sh
            pushd $SRC_DIR
            CURRENT_BUILD_CMAKE_OPTS="-DENABLE_ALL_PACKAGES=ON -DSCOPY_DEV_MODE=ON"
            build_with_cmake OFF
            popd

        - name: Generate screenshots
          run: |
            sudo ldconfig
            export QT_QPA_PLATFORM=offscreen
            python3 $GITHUB_WORKSPACE/tools/screenshots/screenshots.py \
              --all \
              --scopy $GITHUB_WORKSPACE/build/scopy \
              --output-root $GITHUB_WORKSPACE/screenshots_output

        - name: Upload screenshots artifact
          uses: actions/upload-artifact@v4
          with:
            name: documentation-screenshots
            path: ${{ github.workspace }}/screenshots_output/
            if-no-files-found: error
            retention-days: 30
