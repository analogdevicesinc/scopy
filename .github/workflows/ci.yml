name: Build & Test Qt6

on:
    push:
      branches:
        - scopy_qt6_dev
      paths-ignore:
        - 'docs/**'
        - '**.md'
        - '**.rst'
        - 'testing_results/**'
        - '.clang-format'
        - '.cmake-format'
        - '.gitignore'
        - '**/.gitignore'
        - '.github/workflows/license-header.yml'
        - '.github/workflows/generate_doc.yml'
        - '.github/workflows/clang-format.yml'

    pull_request:
      branches:
        - scopy_qt6_dev
      paths-ignore:
        - 'docs/**'
        - '**.md'
        - '**.rst'
        - 'testing_results/**'
        - '.clang-format'
        - '.cmake-format'
        - '.gitignore'
        - '**/.gitignore'
        - '.github/workflows/license-header.yml'
        - '.github/workflows/generate_doc.yml'
        - '.github/workflows/clang-format.yml'

    workflow_dispatch:
      inputs:
        docker_tag:
          description: 'Docker image tag'
          required: true
          default: 'latest'
          type: choice
          options:
            - latest
            - testing

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
  contents: read
  packages: write
  artifact-metadata: write
  checks: write
  actions: write

jobs:
    docker_tag:
      if: github.event_name != 'workflow_dispatch'
      uses: ./.github/workflows/get_docker_tag.yml

    ubuntu-qt6-build:
      needs: docker_tag
      if: always() && (needs.docker_tag.result == 'success' || needs.docker_tag.result == 'skipped')
      uses: ./.github/workflows/ubuntubuild.yml
      with:
        docker_tag: ${{ inputs.docker_tag || needs.docker_tag.outputs.docker_tag }}
      secrets:
        CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}

    appimage-x86_64-qt6:
      needs: docker_tag
      if: always() && (needs.docker_tag.result == 'success' || needs.docker_tag.result == 'skipped')
      uses: ./.github/workflows/appimage-x86_64.yml
      with:
        docker_tag: ${{ inputs.docker_tag || needs.docker_tag.outputs.docker_tag }}
      secrets:
        CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}

    mingw-qt6:
      needs: docker_tag
      if: always() && (needs.docker_tag.result == 'success' || needs.docker_tag.result == 'skipped')
      uses: ./.github/workflows/mingwbuild.yml
      with:
        docker_tag: ${{ inputs.docker_tag || needs.docker_tag.outputs.docker_tag }}
      secrets:
        CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}

    arm64-qt6:
      needs: docker_tag
      if: always() && (needs.docker_tag.result == 'success' || needs.docker_tag.result == 'skipped')
      uses: ./.github/workflows/appimage-arm64.yml
      with:
        docker_tag: ${{ inputs.docker_tag || needs.docker_tag.outputs.docker_tag }}
      secrets:
        CLOUDSMITH_API_KEY: ${{ secrets.CLOUDSMITH_API_KEY }}

