name: Generate documentation

on:
  push:
    branches:
      - main
    tags:
      - v*.*.*
  pull_request:
    types: [opened, synchronize, closed]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build-doc:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    - name: Differentiate main from tag
      run: |
        if [ "${{ github.ref_name }}" != "main" ] ; then
          echo "new_tag=1" >> "$GITHUB_ENV"
        else
          echo "new_tag=0" >> "$GITHUB_ENV"
        fi

    - name: Set TEST_RESULTS_GENERATION if PR branch starts with testsing_v
      if: github.event_name == 'pull_request' && startsWith(github.head_ref, 'testsing_v')
      run: echo "TEST_RESULTS_GENERATION=true" >> $GITHUB_ENV

    - name: Set TEST_RESULTS_GENERATION default
      if: ${{ ! (github.event_name == 'pull_request' && startsWith(github.head_ref, 'testsing_v')) }}
      run: echo "TEST_RESULTS_GENERATION=false" >> $GITHUB_ENV

    - name: Install pip packages
      working-directory: docs
      run: |
        pip install pip --upgrade
        pip install -r requirements.txt

    - name: Generate test report files
      working-directory: docs
      if: github.event_name == 'pull_request' && startsWith(github.event.pull_request.head.ref, 'testing_')
      run: |
        TEST_REPORT_FOLDER=$(echo "${{ github.event.pull_request.head.ref }}" | sed 's/^testing_//') # Remove the testing_ prefix
        echo "test_report_folder=$TEST_REPORT_FOLDER"
        echo "test_report_folder=$TEST_REPORT_FOLDER" >> "$GITHUB_ENV"
        # python3 test_report_generator.py ../testing_results/ tests/test_report/ "${{ github.sha }}"

    - name: Build doc
      working-directory: docs
      run: |
        python3 extract_macros.py ../ user_guide/preferences_table.rst
        export ADOC_DOC_VERSION=${{ github.ref_name }}
        make html SPHINXOPTS='-W --keep-going'

    - name: Store the generated doc
      uses: actions/upload-artifact@v4
      with:
        name: html
        path: docs/_build/html

  deploy-doc:
    runs-on: ubuntu-latest
    needs: build-doc
    if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4
    - run: |
        git config --global user.name "${{ github.event.head_commit.committer.name }}"
        git config --global user.email "${{ github.event.head_commit.committer.email }}"

    - name: Create gh-pages branch
      run: >
        git reset --hard ;
        git clean -fdx ;
        git ls-remote --exit-code --heads origin refs/heads/gh-pages &&
        (
          git fetch origin gh-pages ;
          git checkout -b gh-pages origin/gh-pages ;
          DOC_BUILDS=$(find . -mindepth 2 -name objects.inv -exec sh -c 'dirname {}' ';') ;
          git rm -r . --quiet || true ;
          printf "Detected doc builds: $DOC_BUILDS" ;
          if ! [ -z "$DOC_BUILDS" ]; then
            git checkout @ -- $DOC_BUILDS ;
          fi ;
          if [[ "$new_tag" == "1" ]]; then
            git rm -r ${{ github.ref_name }} --quiet || true ;
          fi ;
          if [[ "$test_report_folder_name" != "" ]]; then
            printf "Should create this folder for testing-docs: ${test_report_folder}" ;
            mkdir -p scopy_testing_results/${test_report_folder} ;
          fi ;
        ) || (
          git checkout --orphan gh-pages ;
          git reset --hard ;
          git commit -m "initial commit" --allow-empty
        )

    # - uses: actions/download-artifact@v4
    #   if: ${{ env.new_tag == '0' }} && ${{ env.test_report_folder == '' }}
    #   with:
    #     name: html
    #     path: scopy_testing_results/${{ env.test_report_folder }}

    - uses: actions/download-artifact@v4
      if: ${{ env.new_tag == '0' }} # && !${{ env.test_report_folder == '' }}
      with:
        name: html

    - uses: actions/download-artifact@v4
      if: ${{ env.new_tag == '1' }}
      with:
        name: html
        path: ${{ github.ref_name }}

    - name: Generate aux files
      run: |
        touch .nojekyll ;
        find . -name objects.inv -exec sh -c 'dirname {}' ';' | cut -c 3- | sort -r | jq -Rn 'reduce inputs as $i ({}; .[$i] = if $i == "" then ["main", "unstable"] elif $i | test("testing_") then [$i | split("/") | last, "testing"] else ["", ""] end )' > tags.json

    - name: Commit and push to gh-pages
      run: |
        git add . >> /dev/null
        git commit -m "deploy: ${GITHUB_SHA}" --allow-empty
        git push origin gh-pages:gh-pages

    - name: Check test_report.rst and get last release tag
      id: get_last_release_tag
      run: |
        if [ "$(cat docs/test_report.rst)" != "no build done" ]; then
          git fetch --tags
          last_tag=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n 1)
          echo "last_release_tag=$last_tag" >> $GITHUB_OUTPUT
        else
          echo "last_release_tag=" >> $GITHUB_OUTPUT
        fi

    - name: Build doc (default, if no build done)
      if: steps.get_last_release_tag.outputs.last_release_tag == ''
      working-directory: docs
      run: |
        python3 extract_macros.py ../ user_guide/preferences_table.rst
        export ADOC_DOC_VERSION=${{ github.ref_name }}
        make html SPHINXOPTS='-W --keep-going'

    - name: Store the generated doc (default)
      if: steps.get_last_release_tag.outputs.last_release_tag == ''
      uses: actions/upload-artifact@v4
      with:
        name: html
        path: docs/_build/html

    - name: Build docs for last release tag (if build is needed for tag)
      if: steps.get_last_release_tag.outputs.last_release_tag != ''
      run: |
        git fetch --tags
        git checkout ${{ steps.get_last_release_tag.outputs.last_release_tag }}
        pip install -r docs/requirements.txt
        cd docs
        python3 extract_macros.py ../ user_guide/preferences_table.rst
        export ADOC_DOC_VERSION=${{ steps.get_last_release_tag.outputs.last_release_tag }}
        make html SPHINXOPTS='-W --keep-going'
        cd ..
        git checkout gh-pages || git checkout --orphan gh-pages
        mkdir -p docs_builds/${{ steps.get_last_release_tag.outputs.last_release_tag }}
        cp -r docs/_build/html/* docs_builds/${{ steps.get_last_release_tag.outputs.last_release_tag }}/
        git add docs_builds/${{ steps.get_last_release_tag.outputs.last_release_tag }}
        git commit -m "Add docs for ${{ steps.get_last_release_tag.outputs.last_release_tag }}"
        git push origin gh-pages
