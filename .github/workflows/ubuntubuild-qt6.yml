name: Ubuntu Qt6 Scopy Build

on:
    workflow_call:
      inputs:
        docker_tag:
          required: true
          type: string

env:
  BUILD_HOST: ubuntu
  USERNAME: github-actions
  CI_SCRIPT: "ON"

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ubuntu 24 Qt6

    container:
        image: docker.cloudsmith.io/adi/scopy-dockers/scopy2-ubuntu24-qt6:${{ inputs.docker_tag }}
        options: --user root

    steps:
        - name: check storage space
          run: df -h
        - uses: actions/checkout@v6
        - name: Build Scopy
          run: |
            git config --global --add safe.directory $GITHUB_WORKSPACE
            $GITHUB_WORKSPACE/ci/ubuntu/ubuntu_build_process_qt6.sh build_scopy

        - name: Run Tests
          run: |
            sudo ldconfig
            cd $GITHUB_WORKSPACE/build
            QT_QPA_PLATFORM=offscreen ctest -V --output-on-failure --output-junit $GITHUB_WORKSPACE/test-result-ubuntu-qt6.xml

        - name: Report
          uses: mikepenz/action-junit-report@v6
          if: always()
          with:
             job_name: Verify Results
             check_name: 'Scopy Qt6 Test'
             check_title_template: '{{TEST_NAME}}'
             report_paths: '${{github.workspace}}/test-result-ubuntu-qt6.xml'
             detailed_summary: 'true'
             fail_on_failure: 'true'
             require_tests: 'true'
             include_passed: 'true'

        - name: check storage space
          run: df -h
