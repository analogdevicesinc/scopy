name: Scopy Qt6 x86_64 AppImage Build

on:
    workflow_call:
      inputs:
        docker_tag:
          required: true
          type: string
      secrets:
        CLOUDSMITH_SERVICE_SLUG:
          required: true

env:
  BUILD_HOST: ubuntu-latest
  USERNAME: github-actions
  CI_SCRIPT: "ON"

permissions:
  id-token: write
  contents: read

jobs:
  make_x86-64_appimage_qt6:
    runs-on: ubuntu-latest
    name: Ubuntu ${{ matrix.ubuntu_version }} Qt6 AppImage
    strategy:
      fail-fast: false
      matrix:
        include:
          - ubuntu_version: "22"
            docker_image: scopy2-ubuntu22-qt6
          - ubuntu_version: "24"
            docker_image: scopy2-ubuntu24-qt6
          - ubuntu_version: "26"
            docker_image: scopy2-ubuntu26-qt6

    steps:
        - name: check storage space
          run: df -h

        - name: "Runner cleanup"
          run: |
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

        - run: df -h

        - uses: actions/checkout@v6
          with:
            set-safe-directory: 'true'
            fetch-depth: '0'

        - name: Generate Cloudsmith OIDC Token
          uses: cloudsmith-io/cloudsmith-cli-action@18665afcce9f859312b61989671af9af7402e4fb # v2.0.2
          with:
            oidc-namespace: 'adi'
            oidc-service-slug: ${{ secrets.CLOUDSMITH_SERVICE_SLUG }}
            oidc-auth-only: 'true'

        - name: Docker login to Cloudsmith
          run: docker login docker.cloudsmith.io -u token -p "$CLOUDSMITH_API_KEY"

        - name: Pull Docker image
          run: docker pull docker.cloudsmith.io/adi/scopy-dockers/${{ matrix.docker_image }}:${{ inputs.docker_tag }}

        - name: Create Scopy Qt6 AppImage
          run: |
            docker run --rm \
              --user root \
              -e CI_SCRIPT=ON \
              -e BUILD_HOST=$BUILD_HOST \
              -e USERNAME=$USERNAME \
              -v $GITHUB_WORKSPACE:$GITHUB_WORKSPACE \
              -w $GITHUB_WORKSPACE \
              docker.cloudsmith.io/adi/scopy-dockers/${{ matrix.docker_image }}:${{ inputs.docker_tag }} \
              bash -c "git config --global --add safe.directory $GITHUB_WORKSPACE && $GITHUB_WORKSPACE/ci/x86_64/x86-64_appimage_process.sh run_workflow"

        - name: Set AppImage env vars
          run: |
            UBUNTU_VERSION_SHORT="${{ matrix.ubuntu_version }}04"
            echo "app_image_folder=scopy-qt6-x86_64-appimage-ubuntu${UBUNTU_VERSION_SHORT}" >> "$GITHUB_ENV"
            echo "app_image_name=scopy-qt6-x86_64-appimage-ubuntu${UBUNTU_VERSION_SHORT}.AppImage" >> "$GITHUB_ENV"

        - name: Set short git commit SHA
          shell: bash
          run: |
            git config --global --add safe.directory $GITHUB_WORKSPACE
            echo "commit_sha=$(git rev-parse --short ${{ github.sha }})" >> "$GITHUB_ENV"

        - uses: actions/upload-artifact@v7
          with:
            name: ${{ env.app_image_folder }}-${{ env.commit_sha }}
            path: ${{ github.workspace }}/${{ env.app_image_name }}

        - name: check storage space
          run: df -h
