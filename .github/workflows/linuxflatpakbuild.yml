name: Scopy Qt6 Flatpak Build

on:
    workflow_call:
      inputs:
        docker_tag:
          required: true
          type: string
      secrets:
        CLOUDSMITH_SERVICE_SLUG:
          required: true

env:
  BUILD_HOST: ubuntu-latest
  USERNAME: github-actions
  CI_SCRIPT: "ON"

permissions:
  id-token: write
  contents: read

jobs:
  make_flatpak_qt6:
    runs-on: ubuntu-latest
    name: Ubuntu Qt6 Flatpak
    steps:
        - name: check storage space
          run: df -h

        - name: "Runner cleanup"
          run: |
            sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
            sudo docker image prune --all --force
            sudo docker builder prune -a --force

        - run: df -h

        - uses: actions/checkout@v6
          with:
            set-safe-directory: 'true'
            fetch-depth: '0'

        - name: Generate Cloudsmith OIDC Token
          uses: cloudsmith-io/cloudsmith-cli-action@18665afcce9f859312b61989671af9af7402e4fb # v2.0.2
          with:
            oidc-namespace: 'adi'
            oidc-service-slug: ${{ secrets.CLOUDSMITH_SERVICE_SLUG }}
            oidc-auth-only: 'true'

        - name: Docker login to Cloudsmith
          run: docker login docker.cloudsmith.io -u token -p "$CLOUDSMITH_API_KEY"

        - name: Pull Docker image
          run: docker pull docker.cloudsmith.io/adi/scopy-dockers/scopy2-flatpak-qt6:${{ inputs.docker_tag }}

        - name: Create Scopy Qt6 Flatpak
          run: |
            $GITHUB_WORKSPACE/ci/general/gen_ci_envs.sh > $GITHUB_WORKSPACE/ci/general/gh-actions.envs
            docker run --privileged \
                -e CI_SCRIPT='ON' \
                --mount type=bind,source="$GITHUB_WORKSPACE",target=$GITHUB_WORKSPACE \
                --env-file $GITHUB_WORKSPACE/ci/general/gh-actions.envs \
                docker.cloudsmith.io/adi/scopy-dockers/scopy2-flatpak-qt6:${{ inputs.docker_tag }} \
                /bin/bash -c 'sudo chown -R runner:runner $GITHUB_WORKSPACE && $GITHUB_WORKSPACE/ci/flatpak/flatpak_build_process.sh'

        - name: Set short git commit SHA
          shell: bash
          run: |
            git config --global --add safe.directory $GITHUB_WORKSPACE
            echo "commit_sha=$(git rev-parse --short ${{ github.sha }})" >> "$GITHUB_ENV"

        - uses: actions/upload-artifact@v7
          with:
            name: scopy-x86_64-flatpak-${{ env.commit_sha }}
            path: ${{ github.workspace }}/Scopy.flatpak

        - name: check storage space
          run: df -h
